name: CI

on:
  push:
  pull_request:

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Syntax smoke tests
        run: sh tests/smoke.sh

      - name: Run shellcheck
        run: |
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n 1 shellcheck
